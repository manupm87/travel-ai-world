name: Deploy Dev Envs to GitHub Pages

on:
  push:
    branches:
      - manu
      - alex
      - joaquin
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (static export)
        working-directory: frontend
        env:
          # /{branch_name}/travel-ai-world/
          NEXT_PUBLIC_BASE_PATH: /${{ github.ref_name }}/travel-ai-world
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NODE_ENV: production
        run: npm run build

      - name: Debug Output
        run: ls -R frontend/out

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
          destination_dir: ${{ github.ref_name }}/travel-ai-world
          keep_files: true
