name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - manu
      - alex
      - joaquin
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed for deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Allow separate concurrent deployments for each dev branch
concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Deployment Variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "base_path=/travel-ai-world" >> $GITHUB_OUTPUT
            echo "dest_dir=." >> $GITHUB_OUTPUT
          else
            echo "base_path=/travel-ai-world/${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "dest_dir=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (static export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.vars.outputs.base_path }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NODE_ENV: production
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
          destination_dir: ${{ steps.vars.outputs.dest_dir }}
          keep_files: true
